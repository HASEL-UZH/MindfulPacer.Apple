name: Tests

on:
  push:
    branches: [main, dev, "features/**"]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Install watchOS simulator runtime
        run: |
          xcodebuild -downloadPlatform watchOS
          xcrun simctl list runtimes

      - name: Resolve packages
        run: |
          xcodebuild -project MindfulPacer/MindfulPacer.xcodeproj \
            -scheme "WatchOS Dev" \
            -resolvePackageDependencies

      - name: Find available watchOS simulator
        run: |
          WATCH_UDID=$(xcodebuild -project MindfulPacer/MindfulPacer.xcodeproj \
            -scheme "WatchOS Dev" -showdestinations 2>/dev/null \
            | grep "watchOS Simulator" | grep -v placeholder \
            | head -n 1 | grep -oEi 'id:[0-9A-F-]{36}' | head -n 1 | cut -d: -f2)
          if [ -z "$WATCH_UDID" ]; then
            echo "::error::No watchOS simulator found"
            exit 1
          fi
          echo "Using simulator: $WATCH_UDID"
          echo "WATCH_UDID=$WATCH_UDID" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          set -o pipefail
          xcodebuild test \
            -project MindfulPacer/MindfulPacer.xcodeproj \
            -scheme "WatchOS Dev" \
            -destination "id=$WATCH_UDID" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color

      - name: Report coverage
        if: always() && !cancelled()
        run: |
          if [ ! -d TestResults.xcresult ]; then
            echo "No test results found, skipping coverage report"
            exit 0
          fi
          echo "## Code Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          xcrun xccov view --report --json TestResults.xcresult \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for target_name in ['WatchOS.app', 'iOS.app']:
              for t in data.get('targets', []):
                  if t['name'] == target_name:
                      pct = t['lineCoverage'] * 100
                      covered = t.get('coveredLines', 0)
                      total = t.get('executableLines', 0)
                      label = target_name.replace('.app', '')
                      with open('$GITHUB_STEP_SUMMARY', 'a') as f:
                          f.write(f'**{label} target: {pct:.1f}%** ({covered}/{total} lines)\n\n')
                          f.write('| File | Coverage |\n|---|---|\n')
                          for file in sorted(t.get('files', []), key=lambda x: -x['lineCoverage']):
                              el = file.get('executableLines', 0)
                              if el > 0:
                                  fc = file['lineCoverage'] * 100
                                  f.write(f'| {file[\"name\"]} | {fc:.1f}% |\n')
                          f.write('\n')
                      print(f'{label} coverage: {pct:.1f}%')
                      break
          "

      - name: Check minimum coverage
        if: always() && !cancelled()
        run: |
          if [ ! -d TestResults.xcresult ]; then
            echo "No test results found, skipping coverage check"
            exit 0
          fi
          xcrun xccov view --report --json TestResults.xcresult \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          MINIMUM = 25
          failed = False
          for target_name in ['WatchOS.app', 'iOS.app']:
              for t in data.get('targets', []):
                  if t['name'] == target_name:
                      pct = t['lineCoverage'] * 100
                      label = target_name.replace('.app', '')
                      if pct >= MINIMUM:
                          print(f'✅ {label}: {pct:.1f}% (minimum: {MINIMUM}%)')
                      else:
                          print(f'❌ {label}: {pct:.1f}% is below minimum {MINIMUM}%')
                          failed = True
                      break
          if failed:
              sys.exit(1)
          "

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult